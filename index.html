<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Anggota KKG Kelas 6</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- Signature Pad -->
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
    body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; }
    .loader { border-top-color: #3498db; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
    @-webkit-keyframes spinner { 0% { -webkit-transform: rotate(0deg); } 100% { -webkit-transform: rotate(360deg); } }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .signature-wrapper { position: relative; width: 100%; height: 200px; border: 2px dashed #cbd5e1; border-radius: 0.5rem; background: #fff; }
    /* Penting: touch-action none agar tidak scroll saat tanda tangan di HP */
    canvas { width: 100%; height: 100%; display: block; touch-action: none; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center py-10 px-4">

  <!-- Header -->
  <div class="max-w-3xl w-full bg-white rounded-xl shadow-lg overflow-hidden mb-6 border-t-4 border-blue-600">
    <div class="p-6 text-center bg-blue-50">
      <h1 class="text-2xl font-bold text-gray-800">DATA ANGGOTA KKG KELAS 6</h1>
      <p class="text-blue-600 font-medium">Kecamatan Cihaurbeuti - Kab. Ciamis</p>
    </div>
  </div>

  <!-- Form Container -->
  <div class="max-w-3xl w-full bg-white rounded-xl shadow-lg p-6 relative">
    
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="hidden absolute inset-0 bg-white/80 z-50 flex items-center justify-center rounded-xl">
      <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
    </div>

    <!-- Step 1: PENCARIAN -->
    <div id="stepSearch" class="transition-all duration-300">
      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-bold mb-2">Masukkan NIP / NUPTK / NIK</label>
        <div class="flex gap-2">
          <input type="number" id="searchId" placeholder="Contoh: 3207..." class="shadow appearance-none border rounded w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
          <button onclick="checkData()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded focus:outline-none focus:shadow-outline transition">
            Cari
          </button>
        </div>
        <p class="text-xs text-gray-500 mt-2 italic">*Jika belum memiliki NIP/NUPTK, silakan masukkan NIK sesuai KTP/KK.</p>
      </div>
    </div>

    <!-- Step 2: FORMULIR INPUT/EDIT -->
    <div id="stepForm" class="hidden mt-6 border-t pt-6">
      <div id="statusMessage" class="hidden mb-6 p-4 rounded-lg"></div>

      <form id="memberForm" onsubmit="event.preventDefault(); saveData();">
        <!-- Input ID -->
        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-bold mb-2">ID (NIP / NUPTK / NIK)</label>
          <input type="text" id="inputId" name="id" class="shadow appearance-none border bg-gray-100 rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none" readonly>
          <p class="text-xs text-red-500 mt-1">*ID ini tidak dapat diubah.</p>
        </div>

        <!-- Nama Lengkap -->
        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-bold mb-2">Nama Lengkap (dengan Gelar)</label>
          <input type="text" id="inputNama" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- Sekolah -->
        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-bold mb-2">Nama Sekolah</label>
          <select id="inputSekolah" required class="shadow border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
            <option value="" disabled selected>-- Pilih Sekolah --</option>
            <!-- Daftar Sekolah di Kec. Cihaurbeuti (UPDATED) -->
            <option value="SDN 1 Cihaurbeuti">SDN 1 Cihaurbeuti</option>
            <option value="SDN 2 Cihaurbeuti">SDN 2 Cihaurbeuti</option>
            <option value="SDN 3 Cihaurbeuti">SDN 3 Cihaurbeuti</option>
            <option value="SDN 4 Cihaurbeuti">SDN 4 Cihaurbeuti</option>
            
            <option value="SDN 1 Cijulang">SDN 1 Cijulang</option>
            <option value="SDN 2 Cijulang">SDN 2 Cijulang</option>
            <option value="SDN 3 Cijulang">SDN 3 Cijulang</option>
            
            <option value="SDN 1 Padamulya">SDN 1 Padamulya</option>
            <option value="SDN 2 Padamulya">SDN 2 Padamulya</option>
            
            <option value="SDN 1 Pamokolan">SDN 1 Pamokolan</option>
            <!-- SDN 2 Pamokolan dihapus -->
            
            <option value="SDN 1 Pasirtamiang">SDN 1 Pasirtamiang</option>
            <option value="SDN 2 Pasirtamiang">SDN 2 Pasirtamiang</option>
            <option value="SDN 3 Pasirtamiang">SDN 3 Pasirtamiang</option>
            <option value="SDN 4 Pasirtamiang">SDN 4 Pasirtamiang</option>
            
            <option value="SDN 1 Sukahurip">SDN 1 Sukahurip</option>
            <option value="SDN 3 Sukahurip">SDN 3 Sukahurip</option>
            
            <option value="SDN 1 Sukamaju">SDN 1 Sukamaju</option>
            <option value="SDN 2 Sukamaju">SDN 2 Sukamaju</option>
            <option value="SDN 3 Sukamaju">SDN 3 Sukamaju</option>
            
            <option value="SDN 1 Sukasetia">SDN 1 Sukasetia</option>
            <option value="SDN 2 Sukasetia">SDN 2 Sukasetia</option>
            
            <option value="SDN 1 Sumberjaya">SDN 1 Sumberjaya</option>
            <option value="SDN 2 Sumberjaya">SDN 2 Sumberjaya</option>
            <option value="SDN 3 Sumberjaya">SDN 3 Sumberjaya</option>

            <option value="SDN 1 Sukamulya">SDN 1 Sukamulya</option>
            <option value="SDN 2 Sukamulya">SDN 2 Sukamulya</option>
            <option value="SDN 3 Sukamulya">SDN 3 Sukamulya</option>
            
            <option value="SDN 1 Sukahaji">SDN 1 Sukahaji</option>
            <option value="SDN 2 Sukahaji">SDN 2 Sukahaji</option>

            <option value="Lainnya">Lainnya (Tulis Manual)</option>
          </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Jenis Kepegawaian</label>
            <select id="inputStatus" required class="shadow border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
              <option value="" disabled selected>-- Pilih Status --</option>
              <option value="ASN PNS">ASN PNS</option>
              <option value="ASN PPPK">ASN PPPK</option>
              <option value="ASN PPPK PW">ASN PPPK Paruh Waktu</option>
              <option value="Honorer">Honorer / Non ASN</option>
            </select>
          </div>
          <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Jabatan</label>
            <input type="text" id="inputJabatan" value="Guru Kelas 6" readonly class="shadow appearance-none border bg-gray-100 rounded w-full py-2 px-3 text-gray-700 leading-tight">
          </div>
        </div>

        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-bold mb-2">Jenis Kelamin</label>
          <div class="flex gap-4">
            <label class="inline-flex items-center">
              <input type="radio" name="jk" value="Laki-laki" class="form-radio text-blue-600" required>
              <span class="ml-2">Laki-laki</span>
            </label>
            <label class="inline-flex items-center">
              <input type="radio" name="jk" value="Perempuan" class="form-radio text-pink-600" required>
              <span class="ml-2">Perempuan</span>
            </label>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Ukuran Baju</label>
            <select id="inputBaju" class="shadow border rounded w-full py-2 px-3 text-gray-700 bg-white" required>
                <option value="S">S</option>
                <option value="M">M</option>
                <option value="L">L</option>
                <option value="XL">XL</option>
                <option value="XXL">XXL</option>
                <option value="XXXL">XXXL</option>
            </select>
          </div>
          <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Ukuran Sepatu</label>
            <input type="number" id="inputSepatu" placeholder="40" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight">
          </div>
        </div>

        <div class="mb-6">
          <label class="block text-gray-700 text-sm font-bold mb-2">Tanda Tangan</label>
          <div class="signature-wrapper">
            <canvas id="signature-pad"></canvas>
          </div>
          <div class="flex justify-between mt-2">
            <span class="text-xs text-gray-500 italic" id="ttdNote">Silakan tanda tangan di kotak atas.</span>
            <button type="button" onclick="clearSignature()" class="text-xs text-red-600 hover:text-red-800 font-bold underline">Hapus Tanda Tangan</button>
          </div>
        </div>
        <!-- Tombol Simpan -->
        <div class="flex items-center justify-end">
          <button type="submit" class="w-full md:w-auto bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-lg focus:outline-none focus:shadow-outline transform hover:scale-105 transition duration-200 shadow-lg">
            SIMPAN DATA
          </button>
        </div>

      </form>
    </div>

    <div class="mt-8 text-center text-xs text-gray-400">
      &copy; 2026 KKG Kelas 6 Kec. Cihaurbeuti
    </div>
  </div>

  <script>
    // --- KONFIGURASI PENTING ---
    // GANTI URL DI BAWAH INI DENGAN LINK APPSCRIPT HASIL DEPLOY ANDA
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyo81wXygS9IEoRxPDMUWfmWE7G4YskX0v8iBTEnfLVcLsLgxRYJu4ctaEspHiEiyRb/exec'; 

    let signaturePad;
    
    // Fungsi resize didefinisikan secara global agar bisa dipanggil ulang
    function resizeCanvas() {
        const canvas = document.getElementById('signature-pad');
        if (canvas) {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            // Hanya resize jika lebar > 0 (artinya elemen terlihat)
            if (canvas.offsetWidth > 0) {
                canvas.width = canvas.offsetWidth * ratio;
                canvas.height = canvas.offsetHeight * ratio;
                canvas.getContext("2d").scale(ratio, ratio);
                // Penting: Kosongkan signature pad setelah resize agar bersih
                if(signaturePad) signaturePad.clear(); 
            }
        }
    }

    window.onload = function() {
      const canvas = document.getElementById('signature-pad');
      // Inisialisasi Signature Pad
      signaturePad = new SignaturePad(canvas, { 
        backgroundColor: 'rgba(255, 255, 255, 0)', 
        penColor: 'rgb(0, 0, 0)' 
      });
      
      window.onresize = resizeCanvas;
    };

    function clearSignature() { signaturePad.clear(); }
    function toggleLoading(show) { document.getElementById('loadingOverlay').classList.toggle('hidden', !show); }

    // --- FUNGSI API FETCH (PENGGANTI GOOGLE.SCRIPT.RUN) ---

    // 1. FUNGSI CEK DATA (GET)
    async function checkData() {
      const id = document.getElementById('searchId').value.trim();
      if (!id) { Swal.fire('Oops...', 'Harap masukkan NIP / NUPTK / NIK!', 'warning'); return; }

      toggleLoading(true);
      
      try {
        // Menggunakan Fetch GET dengan parameter ?action=search
        const response = await fetch(`${SCRIPT_URL}?action=search&id=${id}`);
        const result = await response.json();
        
        onDataChecked(result);
      } catch (error) {
        onFailure(error);
      }
    }

    // 2. FUNGSI SIMPAN DATA (POST)
    async function saveData() {
      const formObject = {
        action: 'save', // Penanda untuk backend
        id: document.getElementById('inputId').value,
        nama: document.getElementById('inputNama').value,
        sekolah: document.getElementById('inputSekolah').value,
        status: document.getElementById('inputStatus').value,
        jabatan: document.getElementById('inputJabatan').value,
        jk: document.querySelector('input[name="jk"]:checked')?.value,
        baju: document.getElementById('inputBaju').value,
        sepatu: document.getElementById('inputSepatu').value,
        signatureData: ""
      };

      if (!signaturePad.isEmpty()) {
        formObject.signatureData = signaturePad.toDataURL();
      } 

      toggleLoading(true);

      try {
        // Menggunakan Fetch POST
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(formObject)
        });
        
        const result = await response.json();
        onSaveSuccess(result);

      } catch (error) {
        onFailure(error);
      }
    }

    // --- CALLBACKS (Sama seperti sebelumnya) ---

    function onDataChecked(result) {
      toggleLoading(false);
      const formDiv = document.getElementById('stepForm');
      const msgDiv = document.getElementById('statusMessage');
      const inputId = document.getElementById('inputId');

      // Set ID di form (hidden dulu sampai popup diklik)
      inputId.value = document.getElementById('searchId').value;

      // Fungsi helper untuk membuka form dan mengatur TTD
      const showForm = () => {
         formDiv.classList.remove('hidden');
         formDiv.scrollIntoView({ behavior: 'smooth' });
         // FIX: Resize canvas setelah form terlihat agar ukurannya benar
         setTimeout(resizeCanvas, 100); 
      };

      if (result.ditemukan) {
        // SCENARIO 1: DATA DITEMUKAN (UPDATE)
        Swal.fire({
            title: 'Data Ditemukan!',
            html: `Data atas nama <b>${result.data.nama}</b> sudah ada.<br>Silakan periksa dan update jika ada perubahan.`,
            icon: 'success',
            confirmButtonText: 'Lanjut Update Data',
            confirmButtonColor: '#3085d6'
        }).then((swalResult) => {
            if (swalResult.isConfirmed) {
                showForm();
                
                msgDiv.className = "mb-6 p-4 rounded-lg bg-yellow-100 text-yellow-800 border border-yellow-200 flex items-center";
                msgDiv.innerHTML = `<span><strong>Mode Update:</strong> Anda sedang mengedit data yang sudah ada.</span>`;
                msgDiv.classList.remove('hidden');

                // Isi form dengan data
                const data = result.data;
                document.getElementById('inputNama').value = data.nama;
                document.getElementById('inputSekolah').value = data.sekolah;
                document.getElementById('inputStatus').value = data.status;
                document.getElementById('inputBaju').value = data.baju;
                document.getElementById('inputSepatu').value = data.sepatu;
                const radios = document.getElementsByName('jk');
                for (let r of radios) { if (r.value === data.jk) r.checked = true; }
                
                if(data.ttd && data.ttd.length > 50) {
                   document.getElementById('ttdNote').innerText = "Tanda tangan lama tersimpan. Tanda tangan ulang hanya jika ingin menggantinya.";
                }
            }
        });

      } else {
        // SCENARIO 2: DATA BARU
        Swal.fire({
            title: 'Data Belum Ada',
            text: 'Data tidak ditemukan. Silakan isi formulir pendaftaran baru.',
            icon: 'info',
            confirmButtonText: 'Isi Formulir Baru',
            confirmButtonColor: '#10B981'
        }).then((swalResult) => {
            if (swalResult.isConfirmed) {
                showForm();
                
                msgDiv.className = "mb-6 p-4 rounded-lg bg-blue-100 text-blue-800 border border-blue-200 flex items-center";
                msgDiv.innerHTML = `<span><strong>Pendaftaran Baru:</strong> Silakan lengkapi data diri Anda.</span>`;
                msgDiv.classList.remove('hidden');
                
                // Reset Form
                document.getElementById('memberForm').reset();
                document.getElementById('inputId').value = document.getElementById('searchId').value;
                signaturePad.clear();
            }
        });
      }
    }

    function onSaveSuccess(result) {
      toggleLoading(false);
      if (result.status === 'success') {
        Swal.fire({ title: 'Berhasil!', text: result.message, icon: 'success' })
          .then((res) => { if (res.isConfirmed) location.reload(); });
      } else {
        Swal.fire('Gagal!', result.message, 'error');
      }
    }

    function onFailure(error) {
      toggleLoading(false);
      console.error(error);
      Swal.fire('Error Koneksi', 'Gagal menghubungi server. Pastikan internet lancar.', 'error');
    }
  </script>
</body>
</html>
